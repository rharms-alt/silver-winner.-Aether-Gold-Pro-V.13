<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHER STUDIOS | PRO GOLD (V.14)</title>
    <style>
        :root { --accent: #38bdf8; --bg: #050810; }
        body { background: var(--bg); color: var(--accent); font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: center; overflow: hidden; touch-action: none; }
        .toolbar { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; margin-bottom: 5px; display: flex; gap: 8px; border: 1px solid var(--accent); flex-wrap: wrap; justify-content: center; width: 95%; }
        .prop-panel { background: rgba(0,0,0,0.9); padding: 10px; border-radius: 10px; margin-bottom: 5px; display: flex; gap: 10px; align-items: center; font-size: 11px; border: 1px solid var(--accent); flex-wrap: wrap; justify-content: center; min-height: 40px; }
        button { background: var(--accent); color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 10px; }
        canvas { background: #000; border: 2px solid var(--accent); border-radius: 4px; touch-action: none; max-width: 95vw; max-height: 55vh; }
        input { background: #111; border: 1px solid var(--accent); color: white; border-radius: 4px; padding: 4px; font-size: 10px; }
        .active { background: #fff !important; box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="addShape('rect')">SQUARE</button>
        <button onclick="addShape('circle')">CIRCLE</button>
        <button onclick="addText()">TEXT</button>
        <button id="pencilBtn" onclick="togglePencil()">PENCIL</button>
        <button id="symBtn" onclick="toggleSym()">MIRROR</button>
        <button onclick="undo()">UNDO</button>
        <button onclick="saveDesign()" style="background:#2ecc71">SAVE PNG</button>
        <button onclick="clearAll()" style="background:#ff4d4d; color:white">RESET</button>
    </div>

    <div class="prop-panel">
        <div id="textEditor" style="display:none; gap:5px; align-items:center;">
            TEXT: <input type="text" id="textInput" oninput="updateText()">
        </div>
        W: <input type="range" id="wPick" min="10" max="600" oninput="updateProp()">
        H: <input type="range" id="hPick" min="10" max="600" oninput="updateProp()">
        ROT: <input type="range" id="rotPick" min="0" max="360" oninput="updateProp()">
        <input type="color" id="colPick" onchange="updateProp()">
        <button onclick="deleteSelected()" style="background:#ff4d4d; color:white">DEL</button>
    </div>

    <canvas id="mainCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
let shapes = [], history = [], selected = null, isDragging = false, isDrawing = false;
let pencilMode = false, symMode = false, offset = { x: 0, y: 0 };

function saveState() { history.push(JSON.stringify(shapes)); if(history.length > 30) history.shift(); }
function undo() { if(history.length) { shapes = JSON.parse(history.pop()); selected = null; } }
function togglePencil() { pencilMode = !pencilMode; document.getElementById('pencilBtn').classList.toggle('active'); selected = null; }
function toggleSym() { symMode = !symMode; document.getElementById('symBtn').classList.toggle('active'); }

function addShape(type) {
    saveState();
    const s = { type, x: 350, y: 200, w: 100, h: 100, color: document.getElementById('colPick').value, rotation: 0 };
    shapes.push(s); selected = s;
}

function addText() {
    saveState();
    const s = { type: 'text', x: 250, y: 200, w: 300, h: 60, color: '#38bdf8', content: 'AETHER', rotation: 0 };
    shapes.push(s); selected = s;
}

function updateText() { if(selected?.type === 'text') selected.content = document.getElementById('textInput').value; }

function updateProp() {
    if(!selected) return;
    selected.color = document.getElementById('colPick').value;
    selected.w = parseInt(document.getElementById('wPick').value);
    selected.h = parseInt(document.getElementById('hPick').value);
    selected.rotation = parseInt(document.getElementById('rotPick').value);
}

canvas.addEventListener('pointerdown', (e) => {
    const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left) * (800/r.width), y = (e.clientY - r.top) * (500/r.height);
    
    if(pencilMode) {
        saveState(); isDrawing = true;
        shapes.push({ type: 'path', color: document.getElementById('colPick').value, size: 4, sym: symMode, points: [{x, y}] });
    } else {
        // Selection Logic
        const found = [...shapes].reverse().find(s => s.type !== 'path' && x > s.x && x < s.x + s.w && y > s.y && y < s.y + s.h);
        if(found) {
            selected = found;
            isDragging = true;
            offset = { x: x - selected.x, y: y - selected.y };
            // Sync UI
            document.getElementById('wPick').value = selected.w;
            document.getElementById('hPick').value = selected.h;
            document.getElementById('rotPick').value = selected.rotation;
            document.getElementById('colPick').value = selected.color || '#38bdf8';
            document.getElementById('textEditor').style.display = selected.type === 'text' ? 'flex' : 'none';
            if(selected.type === 'text') document.getElementById('textInput').value = selected.content;
        } else {
            selected = null;
            document.getElementById('textEditor').style.display = 'none';
        }
    }
});

window.addEventListener('pointermove', (e) => {
    const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left) * (800/r.width), y = (e.clientY - r.top) * (500/r.height);
    if(isDrawing) shapes[shapes.length-1].points.push({x, y});
    if(isDragging && selected) {
        selected.x = x - offset.x;
        selected.y = y - offset.y;
    }
});

window.addEventListener('pointerup', () => { isDragging = false; isDrawing = false; });

function render() {
    ctx.fillStyle = '#050810';
    ctx.fillRect(0,0,800,500);
    
    shapes.forEach(s => {
        ctx.save();
        if(s.type === 'path') {
            ctx.strokeStyle = s.color; ctx.lineWidth = s.size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            const drawP = (pts) => { ctx.beginPath(); pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)); ctx.stroke(); };
            drawP(s.points);
            if(s.sym) drawP(s.points.map(p => ({ x: 800 - p.x, y: p.y })));
        } else {
            ctx.translate(s.x + s.w/2, s.y + s.h/2);
            ctx.rotate(s.rotation * Math.PI / 180);
            ctx.fillStyle = s.color;
            if(s.type === 'rect') ctx.fillRect(-s.w/2, -s.h/2, s.w, s.h);
            else if(s.type === 'circle') { ctx.beginPath(); ctx.ellipse(0,0, s.w/2, s.h/2, 0, 0, Math.PI*2); ctx.fill(); }
            else if(s.type === 'text') { ctx.font = `bold ${s.h}px sans-serif`; ctx.textAlign="center"; ctx.fillText(s.content, 0, s.h/3); }
            
            if(selected === s) { ctx.strokeStyle="white"; ctx.lineWidth=2; ctx.strokeRect(-s.w/2, -s.h/2, s.w, s.h); }
        }
        ctx.restore();
    });
    requestAnimationFrame(render);
}

function saveDesign() { const l = document.createElement('a'); l.download = 'Aether.png'; l.href = canvas.toDataURL(); l.click(); }
function deleteSelected() { if(selected) { saveState(); shapes = shapes.filter(s => s !== selected); selected = null; } }
function clearAll() { if(confirm("Clear All?")) { saveState(); shapes = []; selected = null; } }
render();
</script>
</body>
</html>
