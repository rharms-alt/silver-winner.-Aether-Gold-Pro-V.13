<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHER COMPATIBILITY MODE</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; text-align: center; padding: 20px; }
        #status { padding: 10px; border: 1px solid #ff4d4d; margin-bottom: 20px; display: inline-block; color: #ff4d4d; }
        .toolbar { margin-bottom: 20px; }
        button { background: #00ff41; color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        canvas { background: #111; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="status">CONNECTING TO ENGINE...</div>
    <br>
    <div class="toolbar">
        <button onclick="addSquare()">SPAWN SQUARE</button>
    </div>

    <canvas id="c" width="600" height="400"></canvas>

    <!-- Moving the library to the bottom of the body -->
    <script src="https://jsdelivr.net"></script>

    <script>
        let canvas;
        
        // This function checks every half-second if the library has finally loaded
        let checkLibrary = setInterval(() => {
            if (typeof fabric !== 'undefined') {
                clearInterval(checkLibrary); // Stop checking
                initEngine();
            }
        }, 500);

        function initEngine() {
            try {
                canvas = new fabric.Canvas('c');
                document.getElementById('status').innerText = "AETHER CORE ONLINE";
                document.getElementById('status').style.color = "#00ff41";
                document.getElementById('status').style.borderColor = "#00ff41";
            } catch (e) {
                document.getElementById('status').innerText = "BOOT ERROR: " + e.message;
            }
        }

        function addSquare() {
            if(!canvas) {
                alert("Please wait for system boot...");
                return;
            }
            const rect = new fabric.Rect({
                left: 150, top: 150, fill: '#00ff41', width: 100, height: 100
            });
            canvas.add(rect);
            canvas.renderAll();
        }
    </script>
</body>
</html>
