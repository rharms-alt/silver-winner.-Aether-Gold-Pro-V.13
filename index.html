<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHER STUDIOS | PRO V8</title>
    <style>
        :root { --accent: #38bdf8; --bg: #050810; }
        body { background: var(--bg); color: var(--accent); font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: center; overflow: hidden; touch-action: none; }
        .toolbar { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; margin-bottom: 5px; display: flex; gap: 6px; border: 1px solid var(--accent); flex-wrap: wrap; justify-content: center; width: 98%; }
        .prop-panel { background: rgba(0,0,0,0.95); padding: 10px; border-radius: 10px; margin-bottom: 5px; display: flex; gap: 10px; align-items: center; font-size: 11px; border: 1px solid var(--accent); flex-wrap: wrap; justify-content: center; width: 98%; }
        button { background: var(--accent); color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        canvas { background: #000; border: 1px solid var(--accent); border-radius: 4px; touch-action: none; max-width: 95vw; max-height: 60vh; }
        input, select { background: #111; border: 1px solid var(--accent); color: white; border-radius: 4px; padding: 4px; font-size: 10px; }
        #textInput { background: #000; border: 1px solid #fff; color: #38bdf8; font-weight: bold; width: 120px; }
        .danger { background: #ff4d4d !important; color: #fff; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="addShape('rect')">SQUARE</button>
        <button onclick="addShape('circle')">CIRCLE</button>
        <button onclick="addShape('star')">STAR</button>
        <button onclick="addShape('heart')">HEART</button>
        <button onclick="addText()">+ TEXT</button>
        <button onclick="undo()">UNDO</button>
        <button onclick="cloneSelected()" style="background:#f1c40f">CLONE</button>
        <button onclick="saveDesign()" style="background:#2ecc71">SAVE PNG</button>
        <button onclick="clearAll()" class="danger">RESET</button>
    </div>

    <div class="prop-panel">
        <div id="textControls" style="display:none; border-right: 1px solid #444; padding-right: 10px; display: flex; gap: 8px; align-items: center;">
            EDIT: <input type="text" id="textInput" oninput="updateTextContent()">
            FONT: <select id="fontSelect" onchange="updateProp()">
                <option value="sans-serif">MODERN</option>
                <option value="serif">CLASSIC</option>
                <option value="monospace">CYBER</option>
                <option value="Impact">GAME</option>
                <option value="cursive">ELEGANT</option>
            </select>
        </div>
        COLOR: <input type="color" id="colPick" onchange="updateProp()">
        SIZE: <input type="range" id="wPick" min="10" max="600" oninput="updateProp()">
        ROT: <input type="range" id="rotPick" min="0" max="360" oninput="updateProp()">
        <button onclick="deleteSelected()" class="danger">DEL</button>
    </div>

    <canvas id="mainCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
let shapes = [], history = [], selected = null, isDragging = false, offset = { x: 0, y: 0 };

function saveState() { history.push(JSON.stringify(shapes)); if(history.length > 30) history.shift(); }
function undo() { if(history.length) { shapes = JSON.parse(history.pop()); selected = null; } }

function addShape(type) {
    saveState();
    const s = { type, x: 300, y: 200, w: 100, h: 100, color: '#38bdf8', rotation: 0 };
    shapes.push(s); selected = s;
}

function addText() {
    saveState();
    const s = { type: 'text', x: 300, y: 200, w: 200, h: 60, color: '#38bdf8', content: 'EDIT ME', rotation: 0, font: 'sans-serif' };
    shapes.push(s); selected = s;
    showTextPanel();
}

function updateTextContent() {
    if(selected && selected.type === 'text') {
        selected.content = document.getElementById('textInput').value;
    }
}

function showTextPanel() {
    const panel = document.getElementById('textControls');
    if(selected && selected.type === 'text') {
        panel.style.display = 'flex';
        document.getElementById('textInput').value = selected.content;
        document.getElementById('fontSelect').value = selected.font;
    } else {
        panel.style.display = 'none';
    }
}

function updateProp() {
    if(!selected) return;
    selected.color = document.getElementById('colPick').value;
    selected.w = parseInt(document.getElementById('wPick').value);
    if(selected.type === 'text') {
        selected.h = selected.w / 3; // Keep text proportional
        selected.font = document.getElementById('fontSelect').value;
    } else {
        selected.h = selected.w;
    }
    selected.rotation = parseInt(document.getElementById('rotPick').value);
}

function cloneSelected() {
    if(!selected) return;
    saveState();
    const copy = JSON.parse(JSON.stringify(selected));
    copy.x += 30; copy.y += 30;
    shapes.push(copy);
    selected = copy;
}

canvas.addEventListener('pointerdown', (e) => {
    const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left) * (canvas.width/r.width), y = (e.clientY - r.top) * (canvas.height/r.height);
    selected = [...shapes].reverse().find(s => x > s.x && x < s.x + s.w && y > s.y && y < s.y + s.h);
    if(selected) {
        isDragging = true;
        offset = { x: x - selected.x, y: y - selected.y };
        document.getElementById('colPick').value = selected.color;
        document.getElementById('wPick').value = selected.w;
        document.getElementById('rotPick').value = selected.rotation;
        showTextPanel();
    } else {
        showTextPanel();
    }
});

window.addEventListener('pointermove', (e) => {
    if(!isDragging || !selected) return;
    const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left) * (canvas.width/r.width), y = (e.clientY - r.top) * (canvas.height/r.height);
    selected.x = x - offset.x;
    selected.y = y - offset.y;
});
window.addEventListener('pointerup', () => isDragging = false);

function render() {
    ctx.fillStyle = '#050810';
    ctx.fillRect(0,0,800,500);

    shapes.forEach(s => {
        ctx.save();
        ctx.fillStyle = s.color;
        ctx.translate(s.x + s.w/2, s.y + s.h/2);
        ctx.rotate(s.rotation * Math.PI / 180);
        
        if(s.type === 'rect') ctx.fillRect(-s.w/2, -s.h/2, s.w, s.h);
        else if(s.type === 'circle') { ctx.beginPath(); ctx.ellipse(0,0, s.w/2, s.h/2, 0, 0, Math.PI*2); ctx.fill(); }
        else if(s.type === 'star') {
            ctx.beginPath(); for(let i=0; i<10; i++){ let r = (i%2===0)?s.w/2:s.w/4; ctx.lineTo(r*Math.cos(i*Math.PI/5), r*Math.sin(i*Math.PI/5)); }
            ctx.closePath(); ctx.fill();
        }
        else if(s.type === 'heart') {
            let w = s.w, h = s.h; ctx.beginPath(); ctx.moveTo(0, h/4);
            ctx.bezierCurveTo(0,0, -w/2,0, -w/2,h/4); ctx.bezierCurveTo(-w/2,h/2, 0,h*0.7, 0,h);
            ctx.bezierCurveTo(0,h*0.7, w/2,h/2, w/2,h/4); ctx.bezierCurveTo(w/2,0, 0,0, 0,h/4); ctx.fill();
        }
        else if(s.type === 'text') {
            ctx.font = `bold ${s.h}px ${s.font}`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(s.content, 0, 0);
        }

        if(selected === s) { ctx.strokeStyle="white"; ctx.lineWidth=2; ctx.strokeRect(-s.w/2, -s.h/2, s.w, s.h); }
        ctx.restore();
    });
    requestAnimationFrame(render);
}

function saveDesign() { const l = document.createElement('a'); l.download = 'Aether_Design.png'; l.href = canvas.toDataURL(); l.click(); }
function deleteSelected() { if(selected) { saveState(); shapes = shapes.filter(s => s !== selected); selected = null; showTextPanel(); } }
function clearAll() { if(confirm("Clear everything?")) { saveState(); shapes = []; selected = null; showTextPanel(); } }
render();
</script>
</body>
</html>
