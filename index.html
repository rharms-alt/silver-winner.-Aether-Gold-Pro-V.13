<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHER DEBUG</title>
    <!-- Use a different source for the engine -->
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; text-align: center; padding: 20px; }
        #status { padding: 10px; border: 1px solid #00ff41; margin-bottom: 20px; display: inline-block; }
        .toolbar { margin-bottom: 20px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #wrapper { background: #111; border: 1px solid #333; display: inline-block; }
    </style>
</head>
<body>

    <div id="status">INITIATING...</div>
    <br>
    <div class="toolbar">
        <button onclick="addSquare()">SPAWN SQUARE</button>
    </div>

    <div id="wrapper">
        <canvas id="c" width="500" height="400"></canvas>
    </div>

    <script>
        let canvas;
        
        // Wait 1 second to make sure the library is ready
        setTimeout(() => {
            try {
                canvas = new fabric.Canvas('c');
                document.getElementById('status').innerText = "SYSTEM ONLINE";
                document.getElementById('status').style.borderColor = "#00ff41";
            } catch (e) {
                document.getElementById('status').innerText = "ENGINE ERROR: " + e.message;
                document.getElementById('status').style.color = "red";
            }
        }, 1000);

        function addSquare() {
            if(!canvas) {
                alert("Engine not loaded yet!");
                return;
            }
            const rect = new fabric.Rect({
                left: 100, top: 100, fill: '#00ff41', width: 100, height: 100
            });
            canvas.add(rect);
            canvas.renderAll();
            console.log("Square added!");
        }
    </script>
</body>
</html>
