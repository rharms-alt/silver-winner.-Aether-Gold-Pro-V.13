<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHER STUDIOS | PRO GOLD ULTIMATE</title>
    <style>
        :root { --accent: #38bdf8; --bg: #050810; }
        body { background: var(--bg); color: var(--accent); font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: center; overflow: hidden; touch-action: none; }
        .toolbar { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 12px; margin-bottom: 5px; display: flex; gap: 5px; border: 1px solid var(--accent); flex-wrap: wrap; justify-content: center; width: 98%; }
        .prop-panel { background: rgba(0,0,0,0.95); padding: 8px; border-radius: 10px; margin-bottom: 5px; display: flex; gap: 8px; align-items: center; font-size: 10px; border: 1px solid var(--accent); flex-wrap: wrap; justify-content: center; min-height: 40px; width: 98%; }
        button { background: var(--accent); color: #000; border: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 9px; text-transform: uppercase; }
        canvas { background: #000; border: 2px solid var(--accent); border-radius: 4px; touch-action: none; max-width: 95vw; max-height: 50vh; }
        input, select { background: #111; border: 1px solid var(--accent); color: white; border-radius: 4px; padding: 4px; font-size: 9px; }
        .swatch { width: 14px; height: 14px; border-radius: 3px; cursor: pointer; border: 1px solid #fff; }
        .active { background: #fff !important; color: #000 !important; box-shadow: 0 0 10px #fff; }
        .rec-active { background: #ff4d4d !important; animation: pulse 1s infinite; color: white !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .creator-btn { background: #a855f7 !important; color: white !important; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="addShape('rect')">SQ</button>
        <button onclick="addShape('circle')">CIR</button>
        <button onclick="addShape('star')">STAR</button>
        <button onclick="addShape('heart')">HEART</button>
        <button onclick="addText()">TEXT</button>
        <button onclick="document.getElementById('imgIn').click()">+IMG</button>
        <input type="file" id="imgIn" style="display:none" onchange="addPhoto(event)">
        <button id="pencilBtn" onclick="togglePencil()">Pencil</button>
        <button id="glowBtn" onclick="toggleGlow()">Glow</button>
        <button id="chaosBtn" onclick="toggleChaos()">Chaos: OFF</button>
        <div style="display:flex; gap:3px; margin:0 5px;">
            <div class="swatch" style="background:#38bdf8" onclick="pickColor('#38bdf8')"></div>
            <div class="swatch" style="background:#f472b6" onclick="pickColor('#f472b6')"></div>
            <div class="swatch" style="background:#4ade80" onclick="pickColor('#4ade80')"></div>
        </div>
        <button id="recBtn" onclick="toggleRecord()">REC</button>
        <button onclick="undo()">Undo</button>
        <button onclick="saveDesign()" style="background:#2ecc71">PNG</button>
        <button onclick="showCreator()" class="creator-btn">AI</button>
        <button onclick="clearAll()" style="background:#ff4d4d; color:white">Reset</button>
    </div>

    <div class="prop-panel">
        <div id="textControls" style="display:none; gap:5px;">
            <input type="text" id="textInput" placeholder="Edit..." oninput="updateText()">
        </div>
        W: <input type="range" id="wPick" min="5" max="800" oninput="updateProp()">
        H: <input type="range" id="hPick" min="5" max="800" oninput="updateProp()">
        ROT: <input type="range" id="rotPick" min="0" max="360" oninput="updateProp()">
        <input type="color" id="colPick" onchange="updateProp()">
        <button onclick="deleteSelected()" style="background:#ff4d4d; color:white">DEL</button>
    </div>

    <canvas id="mainCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
let shapes = [], history = [], selected = null, isDragging = false, isDrawing = false;
let pencilMode = false, glowMode = false, chaosMode = false, offset = { x: 0, y: 0 };
let mediaRecorder, recordedChunks = [];

function saveState() { history.push(JSON.stringify(shapes)); if(history.length > 30) history.shift(); }
function undo() { if(history.length) { shapes = JSON.parse(history.pop()); selected = null; } }
function togglePencil() { pencilMode = !pencilMode; document.getElementById('pencilBtn').classList.toggle('active'); selected = null; }
function toggleGlow() { glowMode = !glowMode; document.getElementById('glowBtn').classList.toggle('active'); }
function toggleChaos() { chaosMode = !chaosMode; document.getElementById('chaosBtn').classList.toggle('active'); document.getElementById('chaosBtn').innerText = chaosMode ? "Chaos: ON" : "Chaos: OFF"; }
function pickColor(c) { document.getElementById('colPick').value = c; if(selected) selected.color = c; }
function showCreator() { alert("AETHER STUDIOS | PRO GOLD\n\nDeveloped in collaboration with your AI partner.\nThank you for bringing this project to reality. Keep creating!"); }

function addShape(type) { saveState(); shapes.push({ type, x: 340, y: 190, w: 120, h: 120, color: document.getElementById('colPick').value, rotation: 0 }); selected = shapes[shapes.length-1]; }
function addText() { saveState(); const t = prompt("Text:","AETHER"); if(t) shapes.push({ type: 'text', x: 250, y: 220, w: 300, h: 70, color: '#38bdf8', content: t, rotation: 0 }); selected = shapes[shapes.length-1]; }
function addPhoto(e) {
    const reader = new FileReader();
    reader.onload = (f) => {
        const img = new Image();
        img.onload = () => { saveState(); shapes.push({ type: 'photo', x: 200, y: 100, w: 250, h: (img.height/img.width)*250, img, rotation: 0 }); selected = shapes[shapes.length-1]; };
        img.src = f.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
}

function updateText() { if(selected?.type === 'text') selected.content = document.getElementById('textInput').value; }
function updateProp() {
    if(!selected) return;
    selected.color = document.getElementById('colPick').value;
    selected.w = parseInt(document.getElementById('wPick').value);
    selected.h = parseInt(document.getElementById('hPick').value);
    selected.rotation = parseInt(document.getElementById('rotPick').value);
}

canvas.addEventListener('pointerdown', (e) => {
    const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left) * (800/r.width), y = (e.clientY - r.top) * (500/r.height);
    if(pencilMode) {
        saveState(); isDrawing = true;
        shapes.push({ type: 'path', color: document.getElementById('colPick').value, size: 5, glow: glowMode, points: [{x, y}] });
    } else {
        selected = [...shapes].reverse().find(s => s.type !== 'path' && x > s.x && x < s.x + s.w && y > s.y && y < s.y + s.h);
        if(selected) { 
            isDragging = true; offset = { x: x - selected.x, y: y - selected.y }; 
            document.getElementById('textInput').value = selected.content || "";
            document.getElementById('textControls').style.display = selected.type === 'text' ? 'flex' : 'none';
        }
    }
});

window.addEventListener('pointermove', (e) => {
    const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left) * (800/r.width), y = (e.clientY - r.top) * (500/r.height);
    if(isDrawing) shapes[shapes.length-1].points.push({x, y});
    if(isDragging && selected) { selected.x = x - offset.x; selected.y = y - offset.y; }
});
window.addEventListener('pointerup', () => { isDragging = isDrawing = false; });

canvas.addEventListener('dblclick', (e) => {
    if(!chaosMode) return;
    saveState();
    shapes.forEach(s => { 
        if(s.type !== 'path') {
            s.rotation += (Math.random()-0.5) * 60; 
            s.x += (Math.random()-0.5)*100; 
            s.y += (Math.random()-0.5)*100; 
        }
    });
});

function drawStar(ctx, r, p, m) {
    ctx.beginPath(); for (let i=0; i<p*2; i++) {
        let rad = i%2===0 ? r : r*m;
        ctx.lineTo(rad*Math.cos(i*Math.PI/p - Math.PI/2), rad*Math.sin(i*Math.PI/p - Math.PI/2));
    }
    ctx.closePath(); ctx.fill();
}

function render() {
    ctx.fillStyle = '#050810'; ctx.fillRect(0,0,800,500);
    shapes.forEach(s => {
        ctx.save();
        if(s.type === 'path') {
            ctx.strokeStyle = s.color; ctx.lineWidth = s.size; ctx.lineCap='round'; ctx.lineJoin='round';
            if(s.glow) { ctx.shadowBlur = 15; ctx.shadowColor = s.color; }
            ctx.beginPath(); s.points.forEach((p,i) => i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)); ctx.stroke();
        } else {
            ctx.translate(s.x + s.w/2, s.y + s.h/2); ctx.rotate(s.rotation * Math.PI/180); ctx.fillStyle = s.color;
            if(s.type === 'rect') ctx.fillRect(-s.w/2, -s.h/2, s.w, s.h);
            else if(s.type === 'circle') { ctx.beginPath(); ctx.ellipse(0,0, s.w/2, s.h/2, 0,0, Math.PI*2); ctx.fill(); }
            else if(s.type === 'star') drawStar(ctx, s.w/2, 5, 0.5);
            else if(s.type === 'heart') {
                ctx.beginPath(); ctx.moveTo(0, s.h/4);
                ctx.bezierCurveTo(0,0, -s.w/2,0, -s.w/2,s.h/4); ctx.bezierCurveTo(-s.w/2,s.h/2, 0,s.h*0.7, 0,s.h);
                ctx.bezierCurveTo(0,s.h*0.7, s.w/2,s.h/2, s.w/2,s.h/4); ctx.bezierCurveTo(s.w/2,0, 0,0, 0,s.h/4); ctx.fill();
            }
            else if(s.type === 'text') { ctx.font = `bold ${s.h}px sans-serif`; ctx.textAlign="center"; ctx.fillText(s.content, 0, s.h/3); }
            else if(s.type === 'photo') ctx.drawImage(s.img, -s.w/2, -s.h/2, s.w, s.h);
            if(selected === s) { ctx.strokeStyle="white"; ctx.lineWidth=2; ctx.strokeRect(-s.w/2, -s.h/2, s.w, s.h); }
        }
        ctx.restore();
    });
    requestAnimationFrame(render);
}

function toggleRecord() {
    const btn = document.getElementById('recBtn');
    if (!mediaRecorder || mediaRecorder.state === "inactive") {
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(canvas.captureStream(30), { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const l = document.createElement('a'); l.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' }));
            l.download = 'Aether_Studio_Rec.webm'; l.click();
        };
        mediaRecorder.start(); btn.classList.add('rec-active'); btn.innerText = "REC";
    } else { mediaRecorder.stop(); btn.classList.remove('rec-active'); btn.innerText = "REC"; }
}

function saveDesign() { const l = document.createElement('a'); l.download = 'Aether_Design.png'; l.href = canvas.toDataURL(); l.click(); }
function deleteSelected() { if(selected) { saveState(); shapes = shapes.filter(s => s !== selected); selected = null; } }
function clearAll() { if(confirm("Nuke everything?")) { saveState(); shapes = []; selected = null; } }
render();
</script>
</body>
</html>
